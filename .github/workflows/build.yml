name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: latest-stable

      - name: Print toolchain info
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release

  release:
    name: Create DMG Artifact
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: latest-stable

      - name: Package DMG
        env:
          BUILD: ${{ github.run_number }}
        run: |
          APP_BUILD="${BUILD}" ./scripts/package-dmg.sh
          shasum -a 256 dist/SkillsUI.dmg > dist/SkillsUI.dmg.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SkillsUI-dmg
          path: |
            dist/SkillsUI.dmg
            dist/SkillsUI.dmg.sha256
          if-no-files-found: error
