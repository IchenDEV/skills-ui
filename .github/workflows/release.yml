name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build:
    name: Build and upload release binary
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: latest-stable

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Inject version into source
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          printf '// Auto-generated by CI. Do not edit.\nlet appVersion = "%s"\n' "${VERSION}" \
            > Sources/AppVersion.swift

      - name: Build release binary
        run: swift build -c release

      - name: Create archive and checksum
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          ARCHIVE="SkillsUI-${VERSION}-macos-arm64.tar.gz"
          cd .build/release
          tar -czf "${ARCHIVE}" SkillsUI
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          TAG: ${{ steps.version.outputs.TAG }}
        run: |
          ARCHIVE=".build/release/SkillsUI-${VERSION}-macos-arm64.tar.gz"
          CHECKSUM="${ARCHIVE}.sha256"

          # Create the release if it doesn't already exist
          # (silently no-ops when pre-created from the GitHub UI)
          gh release create "${TAG}" \
            --title "SkillsUI ${TAG}" \
            --generate-notes \
            2>/dev/null || true

          # Upload binary + checksum (--clobber replaces if already uploaded)
          gh release upload "${TAG}" "${ARCHIVE}" "${CHECKSUM}" --clobber
