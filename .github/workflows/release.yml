name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build:
    name: Build and upload release DMG
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: latest-stable

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Inject version into source
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          printf '// Auto-generated by CI. Do not edit.\nlet appVersion = "%s"\n' "${VERSION}" \
            > Sources/AppVersion.swift

      - name: Package DMG
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          BUILD: ${{ github.run_number }}
        run: |
          APP_VERSION="${VERSION}" APP_BUILD="${BUILD}" ./scripts/package-dmg.sh
          DMG_NAME="SkillsUI-${VERSION}-macos-arm64.dmg"
          mv dist/SkillsUI.dmg "dist/${DMG_NAME}"
          shasum -a 256 "dist/${DMG_NAME}" > "dist/${DMG_NAME}.sha256"

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          TAG: ${{ steps.version.outputs.TAG }}
        run: |
          DMG="dist/SkillsUI-${VERSION}-macos-arm64.dmg"
          CHECKSUM="${DMG}.sha256"

          # Create the release if it doesn't already exist
          # (silently no-ops when pre-created from the GitHub UI)
          gh release create "${TAG}" \
            --title "SkillsUI ${TAG}" \
            --generate-notes \
            2>/dev/null || true

          # Upload DMG + checksum (--clobber replaces if already uploaded)
          gh release upload "${TAG}" "${DMG}" "${CHECKSUM}" --clobber
